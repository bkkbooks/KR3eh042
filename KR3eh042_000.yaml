body:
  text: 柯跋傳云三折肱為良醫楚辭云九折臂而成醫曲禮云醫不三世不服其藥則業醫者貴專且久也曾伯祖韻伯公本諸生精研醫理箋疏辨論極夥自著來蘇集等書數種向未梓行表舅祖陳時行韻伯公嫡派吾伯父所受業者淵源固歷歷不爽也吾家藏書頗備刻本鈔本若干卷相與析疑辨難克窮閫奧又與琴川楊資生先生討論有年凡儒生淵博而貫通者廣資稽考則伯父於醫原本先世參究明師博訪良友冥搜曩哲可謂專且久矣今來蘇集等書已刊刻行世是書乃綺石先生所著亦鈔本之一不敢自私鐫刻公世既以闡古人之祕亦以表得力之自云爾乾隆三十六年歲次辛卯小春朔又五日侄男有田謹跋陳跋上理虛元鑑兩卷鈔本無錫顧信成所藏信成研究醫理亟稱此書以為治虛勞功不在仲景傷寒論下鈔一冊見贈且請速梓之以行世觀其序跋稠疊似經刊刻遍求京師及各處坊間叢殘故楮中殊不可得四庫提要及張氏書目答問朱氏匯刻書目均未及收乃亟付剞劂傳諸久遠以為治虛專書未必無補傳寫既久訛廖滋多學識固陋校勘非易不敢臆度傳其可信闕其可疑綱羅考訂有俟篤好綺石先生姓氏里居急切難考觀趙氏跋語豈明末之遺老與避世之隱君子歟殺青既竟書諸簡端大清光緒二十二年嘉平月蕭山陳光淞識
