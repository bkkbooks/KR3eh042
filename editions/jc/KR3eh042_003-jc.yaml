body:
  text: 卷下虛勞本治方歸養心脾湯治夢遺滑精人參黃耆白朮芡實北五味甘草熟地棗仁茯神山藥當歸身參固氣氣固則精有攝而不遺生地滋陰陰滋則火有制而不浮越當歸養血芡實固腎茯神棗仁安神寧志耆朮藥草補氣調中氣旺神昌則精固而病自愈遺甚加萸肉蓮鬚思慮過度加蓮肉不禁加石蓮金櫻膏足痿加牛膝杜仲龜板膠歸養心腎丸生地熟地黃耆白朮山藥芡實茯神棗仁歸身萸肉五味甘草煉蜜丸空心白湯送下三錢二地滋陰當歸養血茯神棗仁補心耆朮藥草調氣補中五味芡實固精滋腎氣虛加人參久遺加杞子金櫻漏滑加蓮鬚芡實心火盛加石蓮寒精自出加蓯蓉鹿茸沙苑菟絲泄瀉加澤瀉蓮肉腰膝軟弱艱於步履加牛膝杜仲龜鹿膠養心固本丸元武膠紅曲炒珠鹿角膠紅曲炒珠萸肉杞子人參黃耆石蓮肉白朮甘草棗仁地黃淮牛膝內石蓮將肉桂一錢同煮一日去肉桂用煉蜜丸收功固本藥也養心固腎丸治漏精生地當歸茯神山藥芡實萸肉陳皮甘草五味石蓮肉河水煎空心服桑螵蛸散治遺精漏不止桑螵蛸一味焙為末酒漿調服一錢三四服即止補元湯治腎痹生地杞子黃耆白朮杜仲牛膝山藥茯苓當歸甘草不拘時服清熱養榮湯治虛勞內熱骨蒸柴胡丹皮地骨皮生地當歸白芍元參茯苓麥冬肉生甘草燈芯三十寸河水煎服加味固本膠生地熟地桔梗茯苓天冬肉元參川貝百合阿膠紫菀麥冬肉甘草白蜜二斤收膠集靈膠天冬麥冬生地熟地元參桔梗甘草白蜜五斤收膠清金養榮丸生地麥冬肉花粉川貝元參白芍茯苓地骨皮丹皮甘草內生地將薄荷湯煮爛搗膠同蜜為丸清金甘桔湯治乾咳桔梗川貝麥冬肉花粉生地元參白芍丹皮粉甘草燈芯河水煎清金百部湯治虛勞久嗽桔梗元參川貝百部生地麥冬丹皮白芍生甘草地骨皮燈芯喘急加白前海粉竹茹如痰吐稠黏脾肺火盛加清金散竹茹花粉清金加減百合固金湯百合桔梗川貝桑皮杏仁花粉麥冬茯苓陳皮生甘草大聖藥春加佛耳草即面兼頭立夏日採取為餅夏加苧麻根秋加金沸草冬加款冬花發熱加柴胡前胡咽痛元參射干素有血症生地丹皮固金養榮湯桔梗桑皮川貝茯苓百合杏仁陳皮甘草生地四兩荷葉湯煮爛搗膏為蜜丸此方與百合固金湯為治血虛痰火主藥清金甘桔湯治咳嗽痰中帶血絲血珠桔梗生地白芍丹皮麥冬元參川貝茯苓阿膠甘草此方加紫菀犀角名膠菀清金湯治咳嗽痰中夾血為丸治咳嗽痰中夾血珠血絲血片去生地桔梗加地骨皮百部名膠菀犀角湯治勞嗽吐血加味犀角地黃湯犀角生地赤芍丹皮蒲黃燈芯三十寸荷葉一大張煎湯代水瓊玉膠生地茯苓人參各等分蜜收固本腎氣丸治陽虛人參黃耆白朮茯苓當歸生地炙草棗仁煨姜鹿角膠還元丹亦治陽虛遠志杜仲牛膝補骨脂山藥茯神鎖陽五味杞子山萸肉熟地菖蒲煉蜜為丸淡鹽湯下獺爪丸治傳屍勞獺爪醋炙為末獺肝陰乾敗龜板銀柴胡百部沙參生地桔梗地骨皮丹皮麥冬甘草共為末每以五分或至七分投入煎劑或丸或膠加入潛使服勿令病者知覺百部清金湯治傳屍勞百部骨皮人參麥冬桔梗生地丹皮芍藥茯苓甘草治虛藥訛一十八辨人參外感風邪元氣未漓審用人參大補元氣沖和粹美不偏不倚故在陰補陰在陽補陽能溫能清可升可降三焦並治五臟咸調無所不可故其治病也除元氣充實外感有餘無事於補者則補之反成壅塞所謂實實也若夫虛勞之病或氣血陰陽水火寒熱上下諸證與夫火痰燥濕滯脹吐利冒厥煩渴及胎前產後痘疹久病病後一經虛字則無不宜而不可少此人參之所以能回元氣於無何有之鄉而其功莫大也自東垣丹溪先後發明並無異議庸醫不察執節齋之瞽說以為人參補陽沙參補陰若補陽則助其火甚至云虛勞人服參者必至不救以致舉世畏參如砒鴆而不敢試豈不誤載黃柏知母禁用丹溪心法有云虛損吐血不可驟用苦寒恐致相激只宜瓊玉膏主之何事首尾矛盾又載三補丸以芩連柏三味主之大補丸以黃柏一味主之乃至滋陰百補丸知柏並用後之學者宗之凡遇虛勞咳嗽吐血虛火虛熱之疾皆以知柏二味以為清火滋陰殊不知虛勞之火虛火也相火也陰火也即丹溪云虛火可補人參黃耆之屬相火繫於肝腎之間出入於甲膽聽命於心君君火明則相火伏若君火不明則相火烈焰沖天上感清虛之竅耳聾鼻乾舌痛口苦頭暈身顫天突急而淫淫作癢肺葉張而咳嗽頻仍當此時也惟有清氣養榮滋方寸靈臺之雨露以寧膻中之煩焰則甲膽乙肝之相火不撲而自滅矣陰火者龍雷之火也起於九泉之下遇寒水陰翳則其焰愈騰若太陽一照自然消隕此三火者皆無求於降火滋陰亦何事乎知柏而用之以貽害乎且黃柏傷胃知母滑脾胃傷則飲食不進脾滑則泄瀉無度一臟一腑乃生人之本經云得谷者昌失谷者亡又曰陽精上奉其人壽陰精下降其人夭今以苦寒傷胃豈非失谷者亡乎以冷滑泄脾豈非下降者夭乎想世用此者意在滋陰而不知苦寒下降多亡陰陰虧而火易熾意在清金而不知中土既潰絕金之源金薄而水益衰吾知用此者未見其利徒見其害耳每見虛勞之人未有不走脾胃而死者則知柏之厲也麥冬五味初病酌用治肺之道一清一補一斂故麥冬清人參補五味斂三者肺怯之病不可缺一者也然麥冬之清斂固有道焉蓋虛勞之初起亦有外感而成故其初治必兼柴胡前胡以疏散之未可驟加斂補施治之次第宜然若不知初病久病之分或驟清驟補驟斂則肺必致滿促而不安邪氣濡滯久而不徹此非藥之害實由用之失節耳若夫疏解之後邪氣既清元氣耗散則當急用收斂清補為主舍此三物更何求焉況五味不但以收斂為功兼能堅固心腎為虛勞必用之藥乃在用之不當者反咎五味酸能引痰致嗽畏而棄之殊不知病至於伏火乘金金氣耗越之際除卻此味更用何藥以收之耶澤瀉宜用夫肺金為氣化之源伏火蒸灼則水道必汙汙則金氣不行而金益病且水停不流則中土濡濕而奉上無力故余治勞嗽吐血之症未有不以導水為先務者每稱澤瀉有神禹治水之功夫亦嘗究其命名之義矣蓋澤者澤其不足之水瀉者瀉其有餘之火也惟其瀉也故能使生地白芍阿膠人參種種補益之品得其前導則補而不滯惟其澤也故雖走濁道而不走清道不若豬苓木通腹皮等味之消陰破氣直走無餘要知澤瀉一用肺脾腎三部咸宜所謂功同神禹者此也古方用六味丸用之功有四種頤生微論論之極詳庸醫不察視為消陰損腎之品置而不用何其謬甚桑皮宜用桑白皮清而甘者也清能瀉肝火之有餘甘能補肺氣之不足且其性潤中有燥為三焦逐水之妙劑故上部得之清火而滋陰中部得之利濕而益土下部得之逐水而散腫凡虛勞症中最忌喘腫二候金逆被火所逼高而不下則為喘土卑為水所侮陷而失堤則為腫喘者為天不下濟於地腫者為地不上交於天故上喘下腫天崩地陷之象也是症也惟桑皮可以調之以其降氣也故能清火氣於上焦以其折水也故能奠土德於下位奈何前人不察以為性不純良用之當戒不知物性有全身上下純粹無疵者惟桑之與蓮乃謂其性不純良有是理乎桔梗宜用夫肺如華蓋居最高之地下臨五臟以布治節之令其受病也以治節無權而氣逆火升水涎上泛濕滯中州五臟俱乖百藥少效惟桔梗稟至清之氣具升浮之性兼微苦之味至清故能清金升浮故能載陷微苦故能降火實為治節君主之劑不但引清報使而已此味升中有降以其善清金金清自能布下降之令故也清中有補以其善保肺肺固自能為氣血之主也且其質不燥不滯無偏勝之弊有十全之功服之久自能清火消痰寬胸平氣生陰益陽功用不可盡述世之醫者每畏其開提發散而於補中不敢輕用多用沒其善而掩其功可惜也丹皮地骨皮宜用夫黃柏知母其為倒胃敗脾之品固宜黜而不錄矣然遇相火爍石流金之際將何以處此曰丹皮地骨皮平正純良用代知柏有成無敗丹皮主陰抑火更兼平肝骨皮清火除蒸更兼養肺骨皮者枸杞之根也枸杞為補腎之要藥然以其升而實於上也但能溫髓助陽虛勞初起相火方熾不敢驟用若其根伏而在下以其在下也故能資腎家真水以其皮故能舒肺葉之焦枯涼血清骨利便退蒸其功用較丹皮更勝且其味本不苦不致倒胃質本不濡不致滑脾施治允當功力萬全有知柏之功而無其害最為善品生地宜用初病審用世人以生地為滯痰之物而不敢輕用是不知痰之隨症而異也雜症之痰以燥濕健脾為主傷寒之痰以去邪清熱交通中氣為主惟虛症之痰獨本於陰虛血少火失其制乃上克肺金金不能舉清降之令精微不徹於上下滯而為痰作咳治宜清肺則邪自降養血則火自平故余於清金劑中必兼養榮為主榮者血也陰者水也潤下之德也清金若不養榮如吹風滅火風勢愈逆烈焰愈生清金養榮者為引水制火沾濡瀰漫煙氣永息故桔梗桑皮貝母之類清金之品也生地丹皮當歸之類養榮之品也而養榮劑中又以生地為第一以生地治雜症之痰則能障痰之道能滯化痰之氣且其力滋補反能助痰之成若加之虛勞劑中則肺部喜其潤心部喜其清腎部喜其滋肝部喜其和脾部喜其甘緩而不冷不滑故勞嗽骨蒸內熱吐血咯血劑中必無遺生地之理惟勞嗽初起客邪未清痰嗽盛時亦暫忌生地滯泥若表症既除內熱蒸灼非生地之清潤以滋養化源則生機將絕矣若畏其滯而始終不用乃是不明要義也茯苓宜用有謂茯苓善滲下元不足者忌之非也蓋茯苓為古松精華蘊結而成入地最久得氣最厚其質重其氣清其味淡重能培土清能益金淡能利水惟其得土氣之厚故能調三部之虛虛熱虛火濕氣生痰凡涉虛者皆宜之以其質中和粹美非他迅利克伐者比也夫金氣清降自能開水之源土氣調平自然益氣之母三臟既理則水火不得憑凌故一舉而五臟均調又能為諸陰藥之佐而去其滯為諸陽藥之使而宣其道補不滯澀泄不峻利精純之品無以過之黃耆宜用余嘗說建中之義謂人之一身心上腎下肺右肝左惟脾胃獨居於中黃耆之質中黃表白白入肺黃入脾甘能補中重能實表夫勞倦虛勞之症氣血既虧中外失守上氣不下下氣不上左不維右右不維左得黃耆益氣甘溫之品主宰中州中央旌幟一建而五方失位之師各就其列此建中之所由名也故勞嗽久已失氣氣不根于丹田血隨氣溢血既耗亂氣亦飛揚斯時也雖有人參回元氣於無何有之鄉究竟不能固真元於不可拔之地欲久安長治非黃耆不可蓋人參之補迅而虛黃耆之補重而實故呼吸不及之際耆不如參若夫鎮浮定亂返本還元統氣攝血實表充里其建立如牆壁之不可攻其節制如將令之不可違其饒益如太倉之不可竭其御邪扶正如兵家之前旄中堅後勁不可動搖種種固本收功之用參反不如耆故補虛以黃耆為牆垣白朮作基址每見服參久久漸至似有若無雖運用有餘終是浮弱不禁風浪若用耆術兼補可至風雨不畏寒暑不侵向來體弱者不覺脫胎換骨誠有見於此也除勞嗽初起中土大傷氣火方盛心肺雖失其和脾胃猶主其事此時只宜養榮為主黃耆微滯尚宜緩投若久病氣虛肺失其制脾失其統上焉而飲食漸難下焉而泄瀉頻作此時若不用黃耆以建中白朮以實土徒以沉陰降濁之品愈傷上奉升騰之用必無濟也白朮宜用初病審用虛勞初起治未有不以清金為第一義者而清金之品生地阿膠丹皮白芍之外又有如麥冬之清心保肺元參之甘寒清火為虛勞所必須然有一種中土素弱之人脾胃不實並麥冬亦微惡其冷元參亦且嫌其寒久久漸妨飲食漸陷中氣於斯時也又宜以培土調中為主其法在雜症門中用藥頗多惟虛症內培土之劑止有黃耆白朮茯苓山藥有功而無過夫虛勞之培土也貴不損至高之氣故二陳之燥平胃之烈固萬萬不可即扁豆之健脾苡仁之勝瘴猶未免於走血俱未盡善若乃四味之中茯苓山藥雖沖和而無峻補回生之力即耆術二種並用又以術為土部專經之劑兼為益氣之品故能培土以生金而至高之部胥有賴也夫術性微燥於虛症似當緩投然卻喜其燥而不烈有閤中央之土德且補土自能生金如山嶽之出雲蒸霧降為雨露以濡萬物而何病燥之有哉繆仲淳謂其燥能傷陰殊不知傷陰為蒼朮厚朴之類豈可以白朮微燥中和之品同語耶且治法收功之時非培土則浮火終不歸根知白朮之功大矣柴胡酌用柴胡升清調中平肝緩脾清熱散火理氣通血出表入里黜邪輔正開滿破結安營扶衛凡臟腑經絡無所不宜在虛勞初起或為外感時邪固為必須之品至於七情所結浸淫鬱滯有待宣通舍此柴前二胡則無有秉性純良出其右者矣故每用些少以佐之然後專用清源補斂之品乃為十全即其調理之人中間或攖或感亦必急用柴胡防風葛根等味徹之然後仍用補斂庶免關門捉賊之患但其性升散用者當中病即止不可多用常用耳更有女人抑鬱傷陰與夫蓐勞之後必當選用蓋多鬱則傷元氣柴胡平肝散郁功最捷也後人因陳藏器一言忌用柴胡遇內傷外感之症將反用麻黃紫蘇等味以散之耶陳皮偶用夫桔梗本以載氣上行而氣火以平者可見虛勞之氣皆由於火侵肺也若雜症之有胸膈氣滯皆由於寒濕侵胃故用陳皮之辛以利之誠為至當乃世醫不察虛勞雜症之分但見胸口氣滯輒以陳皮理氣不知陳皮味辛而性燥辛能耗肺氣之清純燥能動陰虛之相火本以理氣氣反傷矣惟清金之久化源初動脾氣未健胃口漸覺涎多可少加陳皮以快之使中宮一清未為不可又或時氣偶來脾胃濡瀉亦可暫用數劑以清理之然亦須去病則已不宜常用蘇子不必用夫虛勞之火既乘金之氣高而不降治宜平其火而已不必下其氣也惟雜症之喘急而氣高者有三子養親之說而醫者混以治勞以為得真蘇子下之則氣可平而火可降喘可定而痰可消不知其復也必增劇矣惟白前一味為平喘之上品凡擷肚抬肩氣高而急能坐而不能臥能仰而不能俯者用此以平之取效捷而元氣不傷大非蘇子可比枳殼不可用虛勞施治曰清金曰安神曰培土曰調肝曰益腎而惟補之一字徹乎終始故火亦補痰亦補滯亦補三焦五臟六腑十二經絡無所往而不宜補者乃有謬妄之流一見中氣塞滯不究虛實便用枳殼以伐之不知虛勞治氣與雜症不同其滯也不可以利之其高也不可以下之其治滿也不可以破之陳皮蘇子已不當用況枳殼青皮乎杞子酌用虛勞之施治有次序先以清金為主金氣少肅即以調脾為主金土咸調則以補腎要其終故初治類多用元參麥冬漸次耆術終治牛膝龜鹿膠杞子之類收功奏效返本還元凡屬陰虛未有不以此為扼要者也然杞子之性太溫若君火未明相火方熾肺葉舉張之時龍雷鼓動之後投此劑則嗽必頻熱必盛溺必澀血必湧溢而不可止世醫每執杞子性涼之說試問性若果涼胡為興陽之驟耶當歸審用夫當歸之養榮以佐清金也尚矣然其味未免於辛其性未免於溫雖有養血之功亦為行血活血之品故治吐血症者宜待血勢既定血絡稍固君相二火咸調然後以此大補腎水以收功若執古人之論謂當歸命名之義使氣血各得其歸不顧血症新久而用之亦有誤處桂圓審用龍眼大補心血功並人參然究為濕熱之品故肺有鬱火火亢而血絡傷者服之必劇世醫但知其補而昧於清溫之別凡遇虛勞心血衰少夜臥不寧之類輒投之殊不知肺火既清之後以此大補心脾信有補血安神之效若肺有鬱伏之火服之則反助其火或正當血熱上衝之時投此甘溫大補之味則血勢必湧溢而加沖不可不慎也
