body:
  text: 卷上治虛脈法總括脈來緩者為虛軟微弱皆虛也弦為中虛細而微者氣血皆虛小者氣血皆少又脈芤血氣脫沉小遲者脫氣以上皆勞倦之脈虛怯勞熱之症也又微而數者為虛熱微而緩滑者為虛痰治虛脈法分類一心腎不交兩寸弦數兩尺澀紀傳曰左寸脈遲心虛右寸微滑精氣泄二夢泄遺精尺寸脈遲而澀心腎不交夢淫精泄真元耗散不壽之徵又曰寸數脾弦兩尺細數精離位青年左尺微澀色欲傷正傳曰諸芤動微緊男子失精女鬼交心脈短小夢遺精尺數相火熾而遺三漏精右尺弱如發細天精搖搖寒精自出馬口有黏膩之纍房事不久絶孕四腎痹寸虛弱而澀尺沉細而數五夜熱微弦虛數或沉或澀軟弱而細六骨蒸數大或滑急促細而數七乾咳嗽左寸澀數右大急數八虛痰嗽軟細弱氣口微細而數或滑大而虛九血虛痰火左寸澀而弦數右寸虛大而滑或數而澀尺中虛澀又曰細而緊數細則血虛數必咳嗽緊則為寒寒因血虛而客於肺經反而作熱故脈數而咳嗽也十咳嗽痰中帶血珠右寸滑而數或濡而弱即煎厥之症十一咳嗽帶血寸數而大或滑而緊急關寸弦而澀即煎厥十二勞嗽吐血咳血嘔血咯血即薄厥脈得諸澀濡為亡血芤為失血澀為血少際氏曰心脈澀肺脈虛或芤或遲為亡血失精嘔者兼胃火脈經云吐血唾血脈遲小弱者生實大者死唾血堅強者死濡滑者生十三傳尸勞脈經云男子平人脈滑大為勞極虛澀亦為勞十四氣口脈弦而數者脈痿也脈訣氣口數而虛澀肺痿之形疑即肺痿之誤十五六脈軟弱陽虛極也治虛有三本治虛有三本肺脾腎是也肺為五臟之天脾為百骸之母腎為性命之根治肺治脾治腎治虛之道畢矣夫東垣發脾胃一論便為四大家之首丹溪明滋陰一著便為治勞症之宗立齋究明補火謂太陽一照陰火自弭斯三先生者皆振古之高人能回一時之習尚闢岐黃之心傳者然皆主於一偏而不獲全體之用是以脾胃之論出於東垣則無弊若執東垣以治者未免以燥劑補土有拂於清肅之肺金滋陰之説出於丹溪已有弊若執丹溪以治者全以苦寒降火有礙於中州之土化至於陽常有餘陰常不足此實一偏之見難為古人諱者而後人沿習成風偏重莫挽凡遇虛火虛熱陰劇陽亢之病輒以黃柏補腎知母清金未能生腎家真水而反以熄腎家真火夫腎者坎象一陽陷於二陰之間二陰者真水也一陽者真火也腎中真水次第而上生肝木肝木又上生心火腎中真火次第而上生脾土脾土又上生肺金故生人之本從下而起如羲皇之畫卦然蓋腎之為臟合水火二氣以為五臟六腑之根真水不可滅真火獨可熄乎然救此者又執立齋補火之説用左歸右歸丸不離蓯蓉鹿茸桂附等類而不顧其人之有鬱火無鬱火有鬱熱無鬱熱更不慮其曾經傷肺不傷肺夫虛火可補理則誠然如補中益氣湯用參耆朮草之甘溫以除大熱然苟非清陽下陷猶不敢輕加升柴歸薑辛熱之品乃反施之鬱火鬱熱之症奚啻抱薪救火乎余唯執兩端以用中合三部以平調一曰清金保肺無犯中州之土此用丹溪而不泥於丹溪也一曰培土調中不損至高之氣此用東垣而不泥於東垣也一曰金行清化不覺水自流長乃合金水於一致也三臟既治何慮水火乘時乃統五臟以同歸也但主脾主腎先賢頗有發明而清金保肺一著尚未有透達其精微者故余於論肺也獨詳此治勞之三本宜先切究也治虛二統治虛二統統之於肺脾而已人之病或為陽虛或為陰虛陽虛之久者陰亦虛終是陽虛為本陰虛之久者陽亦虛終是陰虛為本凡陽虛為本者其治之有統統於脾也陰虛為本者其治之有統統於肺也此二統者與前人之治法異前人治陽虛者統之以命火八味丸十全湯之類不離桂附者是前人治陰虛者統之以腎水六味丸百補丸之類不離知柏者是余何為而獨主金土哉蓋陰陽者天地之二氣二氣交感乾得坤之中畫而為離離為火坤得乾之中畫而為坎坎為水水火者陰陽二氣之所從生故乾坤可以兼坎離之功而坎離不能盡乾坤之量是以專補腎水者不如補肺以滋其源肺為五臟之天孰有大於天者哉專補命火者不如補脾以建其中脾為百骸之母孰有大於地者哉陽虛三奪統於脾就陽虛成勞之統於脾者言之約有三種曰奪精曰奪氣曰奪火氣為陽火者陽氣之屬精者水火之兼色欲過度一時奪精漸至精竭精者火之原氣之所主精奪則火與氣相次俱竭此奪精之兼火與氣也勞役辛勤太過漸耗真氣氣者火之屬精之用氣奪則火與精連類而相失此奪氣之兼火與精也其奪火者多從奪精而來然亦有多服寒藥以致命火衰弱陽痿不起者此三種之治奪精奪火主於腎奪氣主於脾余何為而悉統於脾哉蓋陽虛之症雖有奪精奪火奪氣之不一而以中氣不守為最險故陽虛之治雖有填精益氣補火之各別而以急救中氣為最先有形之精血不能速生無形之真氣所宜急固此益氣之所以切於填精也回衰甚之火者有相激之危續清純之氣者有沖和之美此益氣之所以妙於益火也夫氣之重於精與火也如此而脾氣又為諸火之原安得不以脾為統哉余嘗見陽虛者汗出無度或盛夏裹綿或腰痠足軟而成痿症或腎虛生寒木實生風脾弱滯濕腰背難於俯仰胻股不可屈伸而成痹症或面色皎白語音輕微種種不一然皆以胃口不進飲食及脾氣不化為最危若脾胃稍調形肉不脫則神氣精血可以次第而相生又何有亡陽之虞哉此陽虛之治所當悉統於脾也陰虛之症統於肺就陰虛成勞之統於肺者言之約有數種曰勞嗽曰吐血曰骨蒸極則成尸疰其症有兼有不兼有從骨蒸而漸至勞嗽者有從勞嗽而漸至吐血者有竟以骨蒸枯竭而死不待成勞嗽者有竟從勞嗽起而兼吐血者有竟從吐血起而兼勞嗽者有久而成尸疰者有始終只一症而或痊或斃者凡此種種悉宰於肺治所以然者陰虛勞症雖有五勞七傷之異名而要之以肺為極則故未見骨蒸勞嗽吐血者預宜清金保肺已見骨蒸勞嗽吐血者急宜清金保肺曾經骨蒸勞嗽吐血而愈者終身不可忘護肺此陰虛之治所當悉統於肺也虛症有六因虛症有六因有先天之因有後天之因有痘疹及病後之因有外感之因有境遇之因有醫藥之因因先天者指受氣之初父母或年已衰老或乘勞入房或病後入房或妊娠失調或色欲過度此皆精血不旺致令所生之子夭弱故有生來而或腎或肝心或脾肺其根底處先有虧則至二十左右易成勞怯然其機兆必有先現或幼多驚風骨軟行遲稍長讀書不能出聲或作字動輒手振或喉中痰多或胸中氣滯或頭搖目瞬此皆先天不足之徵宜調護於未病之先或預服補藥或節養心力未可以其無寒無熱能飲能食並可應接世務而恃為無懼也即其病初起無過精神倦怠短氣少力五心煩熱而已豈知危困即在眉前也因後天者不外酒色勞倦七情飲食所傷或色欲傷腎而腎不強固或勞神傷心而心神耗憊或鬱怒傷肝而肝弱不復調和或憂愁傷肺而肺弱不復肅清或思慮傷脾而脾弱不復健運先傷其氣者氣傷必及於精先傷其精者精傷必及於氣或發於十五六歲或二十左右或三十上下病發雖不一而理則同歸耳因痘疹及病後者痘乃先天陽毒疹乃先天陰毒故痘宜益氣補中則陽毒之發也淨而終身少脾病疹宜清散養榮則陰毒之發也徹而終身少肺病苟致失宜多貽後患故凡後此脾泄胃弱腹痛氣短神瘁精虧色白足痿不耐勞動不禁風寒種種氣弱陽衰之症皆由痘失於補也凡肺風哮喘音啞聲嘶易至傷風咳嗽等類種種陰虧血枯之症皆由疹失於清也至於病後元氣尚虧更或不自重命以勞動傷其氣以縱欲竭其精頃間五臟齊損恆致不救尤宜慎之因外感者俗語云傷風不醒結成癆若元氣有餘者自能逼邪使出或腎精素厚水能救母或素無鬱火鬱熱則肺金不得猝傷若此者不過為傷風咳嗽年老者則為痰火而已不至於成癆也若其人或酒色無度或心血過傷或肝火易動陰血素虧肺有伏火一傷於風火因風動則癆嗽之症作矣蓋肺主皮毛風邪一感於皮毛肺氣便逆而作嗽似乎傷風咳嗽殊不經意豈知咳久不已提起伏火上乘於金則水精不布腎源以絶且久嗽失氣不能下接沈涵水子不能救金母則勞嗽成矣因境遇者蓋七情不損則五勞不成惟真正解脫方能達觀無損外此鮮有不受病者從來孤臣泣血孽子墜心遠客有異鄉之悲閨婦有徵人之怨或富貴而驕佚滋甚或貧賤而窘迫難堪此皆能亂人情志傷人氣血醫者未詳五臟先審七情未究五勞先調五志大宜罕譬曲喻解縛開膠蕩佚者惕之以生死偏僻者正之以道義執著者引之以灑脫貧困者濟之以錢財是則仁人君子之所為也因醫藥者本非癆症反以藥誤而成或病非因感冒而重用發散或稍有停滯而妄用削伐或並無裡熱而概用苦寒或弱體侵邪未經宣發因其倦怠驟患其虛而漫用固表滋里遂致邪熱膠固永不得解凡此能使假者成真輕者變重所宜深辨也心腎論夫心主血而藏神者也腎主志而藏精者也以先天生成之體論則精生氣氣生神以後天運用之主宰論則神役氣氣役精精氣神養生家謂之三寶治之原不相離故於滑精夢泄種種精病者必本於神治於怔忡驚悸種種神病者必本於氣治蓋安神必益其氣益氣必補其精心腎不交論虛勞初起多由於心腎不交或一念之煩其火翕然上逆天精搖搖精離深邃淺者夢而遺深者不夢而遺深之極者漏而不止其或症成骨痿難於步履者畢竟是少火衰微則成陽虛一路不為陰虛之症也其單見心腎不交滑精夢泄夜熱內熱等候者此為勞嗽之因而未成其症也其心腎不交心火炎而乘金天突急而作癢咯不出咽不下喉中如有破絮黏塞之狀此勞嗽已成之症也心腎不交與勞嗽總論在心腎不交之初或夢泄滑精體倦骨痿健忘怔忡或心脾少血肝膽動焰上冒下厥種種諸症但未至傷肺絡成蒸熱者可用養心丸或歸脾丸主之其養心丸內以石蓮肉桂交心腎於頃刻歸脾丸內以龍眼木香甘溫辛熱之品直達心脾主補中而生血引經文主明下安之義以補火為治故凡火未至於乘金補火亦是生土之妙用而何慮乎溫熱之不可從治也哉若夫陰劇陽亢木火乘時心火肆炎上之令相火舉燎原之焰肺失降下之權腎鮮長流之用以致肺有伏逆之火膈有膠固之痰皆畏非時之感胸多壅塞之邪氣高而喘咳嗽頻仍天突火燃喉中作癢咯咽不能嗽久失氣氣不納于丹田真水無以制火於是濕挾熱而痰滯中焦火載血而厥逆清窖伏火射其肺系則能坐而不能臥膈痰滯乎胃絡則能左而不能右斯時急宜清金保肺以宣清肅之令平肝緩火以安君相之位培土調中以奠生金之母滋陰補腎以遏陽光之焰一以中和為治補其虛載其陷鎮其浮定其亂解其爭制其過潤其燥疏其淹滯收其耗散庶有濟也若執補火之説用辛熱之品與彼寒涼傷中者異病而同治豈不殆哉五交論勞嗽吐血之症其難於脾肺之交不必遍論五臟但取其要處言之夫虛症總由相火上炎傷其肺金而相火寄於肝腎故余於清金之外再加白芍酸斂以收之丹皮辛潤以抑之二物能制木之過又能滋木之枯此治金木之交也至於木得火勢而上乘於金金失降下之令已不能浚水之源木強土受其克水寡於畏亦乘風木之勢而上乘淆混於胸膈而為痰涎壅塞膠固稠膩不可開以礙清肅之化此因木土不交水又乘之而肆虐粗工每以陳半香朴治痰之標殊不知此乃水乘木火而上泛為痰比之雜症二陳所主之痰天淵不同余但於清金劑中加牛膝車前澤瀉以導水下行土自安位金水平調天地清肅矣此調木土之交及水土之變也吐血論有不從勞嗽而吐血先之者心火肝木之為病主也然又有煎厥薄厥之分煎厥者從陰虛火動煎灼既久血絡漸傷旋至吐血其勢較緩薄厥者薄乃雷風相薄之薄心熱為火火熱為風風火相薄厥逆上衝血遂菀亂湧出其勢較急煎厥單動於心火不得風助故無勢而緩薄厥兼動於肝火火得風助故有勢而急大抵性急多盛怒者往往成薄厥且是症也又當防其瘀血滲入肺系鬱而不散以至積陽為熱積陰為疰喘嗽交加病日以深而成勞嗽也大凡治吐血宜以清金保肺為主金令既肅肝木得其平而火自不敢肆至於骨蒸之久煎灼真陰火炎傷肺亦宜急化其源庶乎水得所養而火漸熄不至為勞嗽之漸也紅症初起治法吐紅薄厥之症初治用犀角地黃湯不效者以犀地雖有涼血止血之功而其力尚緩故也凡吐血正湧之時法宜重在止血宜以炒蒲黃炒側柏葉棕灰三味為主佐以紫菀犀角地黃白芍之類若血勢過盛不止者再用清金散碧玉丹一墜其火即降更不止再加童便甚至血勢湧溢並湯藥無隙可進者須以熱酒濯其兩足自能引火下行而血漸止然後投以上藥可也勞嗽症論余於勞嗽症嘗列四候以為準夫四候者肺有伏逆之火膈有膠固之痰皆畏非時之感胸多壅塞之氣然此四候以肺火伏逆為主餘三候則相因而至蓋肺為五臟之天司治節之令秉肅清之化外輸精於皮毛內通調乎四瀆故飲食水穀之精微由脾氣蒸發以後悉從肺為主上榮七竅下封骨髓中和血脈油然沛然施於周身而何痰涎之可成哉惟肺為火薄則治節無權而精微不布於上下留連膈膜之間滯而為痰痰老則膠固而不可解氣無以宣之也又肺主皮毛外行衛氣氣薄而無以衛外則六氣所感怯弱難御動輒受損則本病而復標邪乘之或本火標風則風助火勢而清火易滯其氣驅風必燥其營本火標寒則寒火結聚而散寒則火煽降火必寒收本火標暑則暑火同氣本火標濕則濕火交煎虛勞一遇此等標邪觸發或兼傷寒或兼瘧痢必至輕者重而重者危故於時已至而氣未至時未至而氣先至或至而太過至而不及等皆屬虛風賊邪所宜急防之也胸者心肺交加之部火炎攻肺而氣不得以下輸則氣多壅塞尤不當以寬胸理氣之劑開之總之肺氣一傷百病蜂起風則喘痰則嗽火則咳血則咯以清虛之臟纖芥不容難護易傷故也故於心腎不交之初火雖乘金水能救母金未大傷者預當防維清肅之令以杜其漸而況勞嗽已成可不以保肺為治哉勞嗽初起治法勞嗽初起之時多兼表邪而發蓋肺部既虧風邪乘虛而入風寒入肺化為火邪邪火與內火交灼則肺金愈傷而咳嗽因之不止庸醫但知勞嗽為內臟本病而驟以耆術益其氣歸地補其血甚以白芍五味棗仁斂其邪則邪氣深滯腠理膠固而難拔矣余凡遇此症先以柴胡前胡清理表邪及桔梗貝母兜鈴之類清潤而不泥滯者以清理肺金或六七劑後方用清涼滋陰之品以要其終但柴胡可多用幾劑前胡止可用一二劑若表邪一清柴胡亦須急去也乾咳嗽論乾咳者有聲無痰病因精血不足水不濟火火氣炎上真陰燔灼肺臟𪸓澀而咳也丹溪云此係火邪鬱於肺中而不能發水火不交所致宜補陰降火症從色欲來者瓊玉膏最捷午後咳陰虛也黃昏咳火氣上感於肺也咳嗽痰中帶血珠血絲此症大約皆從鬱火傷肺肺金受邪不能生水水火不相濟則陰火亢陽而為痰血凝結火載上逆乃煎厥之漸也多因志節拘滯預事而憂或鬱怒傷肝或憂憤傷心不能發泄而成若不早治肺金受傷之至火盛血逆成塊成片夾痰而出有時無痰而出輕則見於清晨甚則時時頻見或拂鬱憤怒則隨觸隨見即煎厥也不急治則為薄厥而病篤矣論勞嗽吐血能治不能治大旨血症生死之辨以大肉不消者其病輕大肉漸消者其病重若大肉脫盡者萬無生理倘虛熱已退紅症已止痰嗽皆除而大肉未消或既消而脾胃猶強藥食滋補大肉漸漸長起則猶可治設使仍前不長者斷然不可治即使飲食自健亦不過遷延時日而已每見患怯之人起居如常正當進膳之時執匕箸而去者即此症也凡患此症者如心性開爽善自調養又當境遇順適則為可治若心性系滯或善怒多郁處逆境而冤抑難堪處順境而酒色眷戀又不恪信醫藥死何疑焉虛勞內熱骨蒸論虛勞發熱皆因內傷七情而成人之飲食起居一失其節皆能成傷不止房勞一端為內傷也凡傷久則榮衛不和而發熱熱變蒸蒸類不一凡骨脈皮肉五臟六腑皆能作蒸其源多因醉飽後入房及憂思勞役或病飲食失調暨大喜大怒大痛大淚嚴寒酷暑房勞不能調攝邪氣入內而成注注之為言住也外邪深入連滯停住而不能去也注不治則內變蒸蒸失治則咳嗽吐痰咳血而病危矣故夜熱內熱虛熱為虛勞之初病骨蒸內熱潮熱則虛勞之本病也宜及時調治毋使滋蔓治法以清金養榮疏邪潤燥為主則熱自退矣虛火伏火論諸火可補火諸熱不可補火又他臟有虛火可補火肺臟有伏火不可補火斯言實發前人未發之旨何謂諸火可補火火者虛火也謂動於氣而未著於形其見於症易升易降倏有倏無其發也盡有燎原之勢或面紅頰赤或眩暈厥冒種種不同而皆可以溫潤補腎之劑以收其浮越而引歸於性根命蒂之中補之可也何謂諸熱不可補火熱者實熱也謂其先動於氣久而漸著於形如燒熱之物相似其見於症有定時有定處無升降無變遷其夜間準熱日間不熱者為夜熱其裡面恆熱而皮膚未熱者為內熱其熱如在骨髓間蒸出而徹於皮膚者為骨蒸勞熱此種種蒸熱有清法無溫理補之不可也何謂他臟有虛火可補火肺臟有伏火不可補火蓋肺與四臟有別如肝腎龍雷之火可補而伏脾胃寒格之火可補而越心家虛動之火可補而定惟肺之一臟屬金金畏火克火喜鑠金故清肅之臟最畏火此言其臟質也肺居膈上其氣清其位高火若上衝則治節失令而痰滯氣塞喘嗽交加故至高之部極畏火此以部位言之也然或偶然浮越之火猶不犯此禁獨至伏逆之火出於陰虛陽亢火乘金位謂之賊邪以其火在肺葉之下故名伏以其火只星星便能使金令捍格故名逆凡若此者症必膠痰固膈吸短呼長脈必細而數細為血虛數為火勝此在少年為勞嗽之根四十以外為血虛痰火之兆宜用清法無用溫理其斷不可補者也遺精夢泄論精雖藏於腎而實主於心心之所藏者神神安則氣定氣為水母氣定則水澄而精自藏於命門其或思慮過度則火水不交快情恣欲則精元失守所以心動者神馳神馳則氣走精逐而流也且心主血心血空虛則邪火上壅而淆其靈舍於是神昏志蕩天精搖搖淫夢交作而精以泄其甚者不待夢而時泄此時以降火之法治之而火不可降即以龍骨牡蠣澀精之品施之亦屬隨止隨發殊不知神不歸舍斯精不歸元故腎病當治其心宜以養氣安神為主以潤燥滋血之品為先君火既安相火自能從令神清氣爽而精安有不固者哉人身之精融化於周身如樹中膠汁本無形質至因情動搖遂各成形質而出其所出者已為精之死物矣是不獨精出於腎然也他如貪心動則津出哀心動則淚出愧心動則汗出皆為精所施化多出皆能傷精但與遺精者相較則感有淺深質有厚薄傷有輕重耳腎痹論此即遺精痿症也其初起於酒色不節精血日竭水火俱衰肝風脾濕腎虛生寒三氣合聚而為腎痹宗筋不能束骨節利機關足難步履腰背難以俯仰坐臥難支總因傾盡真元而筋骨日瘁也法宜清氣安神以養心脾之血潤燥滋血以歸肝腎之陰白濁白淫論白濁白淫從新久定名初出莖中痛而濃濁如膏謂之白濁久之不已精微弱而薄痛亦漸減至後聞淫聲見女色而精下流清稀而不痛則謂之白淫也白濁全屬火至白淫則火衰而寒勝矣此因腎家元氣降而不升故黏絲帶膩馬口含糊而不已治法宜回陽氣而使上升固其精元而不使下陷則病自止矣外此有症非屬虛而濕熱下注者宜從丹溪治法又有所求不遂志意鬱結而精泄及氣虛人失精氣而遺者皆非虛病也女人虛勞女人虛勞有得之鬱抑傷陰者有得之蓐勞者有得之崩帶者其鬱抑傷陰雖以調肝為急終是金能剋木蓐勞崩帶雖以補腎為急終是金能生水此陰虛成勞總不離乎清金以為治也蓐勞非即是勞嗽蓐勞重然後傷肺而勞嗽以成治當以歸脾養榮兼清金主之別有氣極一種短氣不能言者卻不在陽虛例乃肺病也此症雖陳皮亦在所忌尸疰傳尸勞等症夫勞極之候血虛血少艱於流布甚至血不脫於外而但蓄於內蓄之日久周身血走之隧道悉痹不流而營分日虛於是氣之所過徒蒸瘀血為熱熱久則蒸其所瘀之血化而為蟲遂成尸疰瘵症其或因濕火蒸化或因死痰滲入清窖而成皆是類也自此竭人之神氣養蟲之神氣人死則蟲亦死其遊魂之不死者傳親近之一脈附入血隧似有如無其後蟲日榮長人日凋瘁而命隨以斃故傳尸勞又與尸疰症不同尸疰因虛損而成若傳尸則在素無虛損之人一傳染即現出勞怯候或發熱骨蒸或咳嗽吐血唇紅面青等症者是所傳亦分五臟在脾腸澼在心吐血在肝與肺則咳嗽也治尸疰以清金養榮為本其殺蟲斷祟當以獺肝獺爪熊指啄木等丹治之至犯傳尸者一見其外症唇紅面青骨蒸內熱飲食健啖而人漸瘦不已者必有蟲也治以獺爪百部丸主之虛勞當治其未成患虛勞者若待其已成而後治之病雖愈亦是不經風浪不堪辛苦的人在富貴者猶有生理貧者終難保也是當於未成之先審其現何機兆中何病根爾時即以要言一二語指示之令其善為調攝隨用湯液十數劑或用丸劑膠劑二三斤以斷其根豈非先事之善策哉知節節為節省之義虛勞之人其性情多有偏重之處每不能撙節其精神故須各就性情所失以為治其在蕩而不收者宜節嗜欲以養精在滯而不化者宜節煩惱以養神在激而不平者宜節忿怒以養肝在躁而不靜者宜節辛勤以養力在瑣屑而不坦夷者宜節思慮以養心在慈悲而不解脫者宜節悲哀以養肺此六種皆五志七情之病非藥石所能療亦非眷屬所可解必病者生死切心自訟自克自悟自解然後醫者得以盡其長眷屬得以盡其力也知防虛人再經不得一番傷寒或一番痢疾或半年幾月瘧疾輕傷風感冒亦不宜輒受所以一年之內春防風又防寒夏防暑熱又防因暑取涼而致感寒長夏防濕秋防燥冬防寒又防風此八者病者與調理病人者皆所當知即醫師亦須深明五運六氣之理每當時序推遷氣候偏重即宜預為調攝挽救以補陰陽造化之偏而制其太過扶其不足經云毋翼其勝毋贊其復間其未然謹其將然修其已然即此之謂也二護寒從足起風從肩俞眉際而入病者常護此二處則風寒之乘於不意者少矣其間有最緊要者每當時氣不佳之際若肩背經絡之間覺有些少淅瀝惡寒肢節痠軟拘束周身振顫立身不定光景即刻斷食一周其稍重者略散以煎劑自脫然而愈若時氣初染不自覺察再加以飲食鬥湊經邪傳裡輕者蒸灼幾日重者恆致大害三候前者四季之防六氣本而防標之説也若夫二十四候之間有最與本症為仇者其候有三一為春初木盛火升一為仲夏濕熱令行一為夏秋之交伏火鑠金此三候中如有一候未曾透過雖嗽平吐止火降痰寧病者怡然以為無事矣而不知氣候之相剋有在於尋常調燮之外者一交三候遂與本症大逆平者必復復者必深深者不救是惟時時防外邪節嗜欲調七情勤醫藥思患而預防之方得涉險如夷耳二守二守者一服藥二攝養二者所宜守之久而勿失也蓋勞有淺深治有定候如初發病尚輕淺亦有不藥而但以靜養安樂而自愈稍重者治須百日或一年煎百濟丸二料膏一服便可斷除病根至於再發則真陰大損便須三年為期此三年間起於色者節欲起於氣者慎怒起於文藝者拋書起於勞倦者安逸起於憂思者遣懷起於悲哀者達觀如是方得除根至於三發則不可救矣且初發只須生地元參百合桔梗之類便可收功至於再發非人參不治是在病者之盡其力而守其限識所患之淺深近久量根本之輕重厚薄而調治之勿躁急取效勿惜費恣情勿始勤終怠則得之矣三禁治勞三禁一禁燥烈二禁伐氣三禁苦寒是也蓋虛勞之痰由火逆而水泛非二陳平胃縮砂等所開之痰虛勞之火因陰虛而火動非知柏芩連梔子等所清之火虛勞之氣由肺薄而氣窒非青枳香蔻蘇子等所豁之氣乃至飲食所禁亦同藥餌有因胃弱而用椒胡茴桂之類者其害等於二陳有因煩渴而啖生冷鮮果之物者其害同於知柏有因氣滯而好辛辣快利之品者其害甚於青枳此三禁不可不知也四難一家中如父母慈兄弟友夫婦摯而有別僮僕勤而不欺此四者在人而不在己在本家而不在醫師故曰難也夫治勞之淺者百日收功稍深者期年為限更深者積三歲以為期其日逾久則恩勤易怠其效難期則厭棄滋生苟非金石之堅難免嘖室之怨一著失手滿盤脫空雖非醫師之過而為醫者亦不可不知也勞傷非弱症有平時心腎不虧並無弱症偶有房勞猝然嘔血者其血從胃中來不得以怯症論治宜以分理安胃為主不必用黃芩花粉元參等藥之涼亦不必用黃耆白朮山藥之補只須柴胡貝母桔梗澤瀉丹皮白芍麥冬之類治之更有勞傷筋力而得者只宜調其胃氣而自愈嘔吐見血非弱症往往有人患嘔血甚多醫者遂認為弱症誤也此先傷於怒怒氣傷肝肝臟原有血積於中後傷於寒寒入胃故嘔吐嘔吐傷氣氣帶血而暴厥耳是不可與怯症之血同論當於治嘔藥中加楂肉先行其瘀止其吐後再徐調其他症自可萬全也傷寒見血非弱症有勞倦傷血瘀積胃絡兼受風寒寒邪迫血火不能降以致吐血衄血不可以弱症施治若誤投涼劑則寒愈結而血難止只宜散其風寒少加調血歸經之品使邪外泄而火下降則血自止矣或問何以辨之曰頭痛惡寒戰栗手足逆冷而其人素無虛症如虛火上炎不足之候身體不瘦突然而起者是也腸風便血不同怯症每見先天不足之人得腸紅便血之症不肯自認為勞怯且以為輕病而不治久久至氣血盡而不治者甚多不知虛弱之人飢飽勞役風寒暑濕乘虛而入兼之酒色太過濕滯中州元氣下陷客風邪火流入腸胃氣滯血凝腐敗潰亂而成土崩河決之勢若不速治將成大患治法如何曰不過散其風燥其濕寬其腸行其氣活其瘀止其血升其陷而已散風用炒黑防風荊芥為主此二味生用則能散風於上部炒用則散風於二腸荊芥尤為要藥寬腸行氣以炒枳殼為主止血以炒黑蒲黃醋炒地榆為主行瘀以紫菀為主兼有調血歸經之妙升陷以升麻柴胡為主燥濕以白朮澤瀉茯苓為主風散濕除氣行瘀消元陽生髮則病自愈能節勞戒氣貶酒卻色善自調攝且知起居服食禁忌自不復發更兼以調和氣血補助先天之劑投之與虛勞血症收功之法同治終身可以無患陽虛陰症辨有男子脾腎氣虛腰膝無力目眩耳鳴形體憔悴溏泄無度飲食少進步履艱難似乎陰虛弱症而非也何以辨之曰不咳嗽不內熱骨蒸不潮熱吐紅是也然其脈必軟緩微弱虛寒之極治法當回陽返本健脾益胃交補心腎為主則寒谷陽回萬物發生軟懶症辨有一種軟懶之症四肢倦怠面色淡黃或膈中氣滿不思飲食其脈沉遲澀滯軟弱無力或表氣不清惡寒發熱當其寒則脈愈加沉澀當其熱則脈微見細數或傳裡內熱則脈氣沉洪或洪數總之定帶軟弱不清之象此內傷兼外感其邪只在肌表筋骨之間未深入臟腑其所感尚輕故不成傷寒瘧痢等疾而為此軟弱因循之症也久久不治成硬頭黃者居多若脾虛濕勝者則成黃腫若肺氣不足者流入清虛之腑則壅為痰嗽若血少者遷延歲月則成內熱或五心煩熱日晡潮熱漸似骨蒸勞熱矣此症大都得諸藜藿窮簷之輩間有膏粱之人因房勞不節或竊玉偷香恐懼憂驚或埋首藝窗用心過度或當風取涼好食生冷致風寒傳染鬱而不散乃內傷兼外感而成其外象酷似弱症若察症不的初起遽投以涼劑補藥則邪正混淆不得清徹以致寒邪閉遏鬱於經絡而為內熱遂成真病人家子弟患此類多諱疾忌醫不便直告人自認虛弱見醫者投以清理散邪之品反不肯服所以難治亦難辨也然則何以辨之曰頭不痛身不熱不煩嗽不唾血但腿痠腳軟蒸蒸內熱胸中邪氣隔緊食不易飢與之食則食不與亦不思或今日思此物明日即不喜又思別物適口如怯症之嘗食勞也治法當其未入里時宜和解分消托之使出用八物湯加減去黃芩加前胡山楂陳皮之類濕勝有痰者重以二陳湯稟氣厚者加枳殼用此數劑邪自解散若邪已入里難從肌表散去則宜重在分消使邪從小便而出表裡既清之後以養氣養血之品培其本源若起於憂驚思慮者以交固心腎之藥要其終則霍然矣玉芝云外感軟懶之症切不可發汗汗之則虛暈欲倒以其兼內傷重也治宜柴胡防風葛根蘇梗陳皮山楂枳殼澤瀉等味主之小便不利者加車前質弱者去枳殼數劑後加丹參再後加當歸若脾虛下泄者稍加燥味若血虛內熱者少加丹皮地骨皮此症須以百日為期若未及百日而不肯服藥者變成黃症矣老年怯症難治説諺有少無風癱老無癆瘵之説故中年以後人往往有勞嗽吐血咳血症不肯自認為怯症曰不過是血虛痰火而已不知少年精血易生老年氣血易虧精力不長病此更難得愈然則施治有老少之別乎曰少年之病難治而易愈老年之病易治而難愈所以易治者為其相火易衰色心已淡性氣已灰怒氣少動故也若二者不戒死期更促耳至於治法則從同也
